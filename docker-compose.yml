services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /srv/jekyll
    volumes:
      - ./:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    ports:
      - "4000:4000"
    command: >
      sh -lc "bundle install && bundle exec jekyll serve --host 0.0.0.0 --port 4000 --livereload"

volumes:
  bundle_cache:
